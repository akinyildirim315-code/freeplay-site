<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yılan Oyunu – FreePlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07090d;
      color: #c6d4df;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(102,192,244,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(77,179,75,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative; z-index: 10;
      width: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(102,192,244,0.12);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; cursor: pointer; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #66c0f4, #4fa3d4);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; box-shadow: 0 0 12px rgba(102,192,244,0.4);
    }
    .logo-text { font-size: 18px; font-weight: 700; color: #fff; }
    .logo-text span { color: #66c0f4; }

    .back-btn {
      background: rgba(102,192,244,0.08);
      border: 1px solid rgba(102,192,244,0.2);
      color: #66c0f4;
      padding: 7px 16px; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      text-decoration: none; transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(102,192,244,0.18); border-color: #66c0f4; }

    .game-wrapper {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 20px 20px 16px;
    }

    .game-title {
      font-size: 26px; font-weight: 900; color: #fff;
      text-align: center; letter-spacing: -0.5px;
      text-shadow: 0 0 30px rgba(102,192,244,0.3);
    }
    .game-title span { color: #4db34b; }

    /* Score board */
    .score-board {
      display: flex; gap: 0;
      background: rgba(10,15,20,0.8);
      border: 1px solid rgba(102,192,244,0.15);
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .score-item {
      text-align: center; padding: 12px 28px;
      position: relative;
    }
    .score-item + .score-item::before {
      content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 1px; background: rgba(102,192,244,0.1);
    }
    .score-label { font-size: 10px; color: #4a6577; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .score-value { font-size: 26px; font-weight: 900; margin-top: 2px; line-height: 1; }
    .score-value.accent { color: #66c0f4; text-shadow: 0 0 20px rgba(102,192,244,0.5); }
    .score-value.green { color: #4db34b; text-shadow: 0 0 20px rgba(77,179,75,0.5); }
    .score-value.white { color: #fff; }

    /* Canvas wrap */
    .canvas-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(102,192,244,0.15),
        0 0 60px rgba(102,192,244,0.08),
        0 20px 60px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    canvas { display: block; }

    .overlay {
      position: absolute; inset: 0;
      background: rgba(7,9,13,0.85);
      backdrop-filter: blur(6px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
    }

    .overlay-icon { font-size: 52px; line-height: 1; filter: drop-shadow(0 0 20px currentColor); }
    .overlay-title { font-size: 30px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
    .overlay-sub { font-size: 14px; color: #6a8a9a; }
    .overlay-score {
      font-size: 18px; font-weight: 700; color: #66c0f4;
      background: rgba(102,192,244,0.1);
      border: 1px solid rgba(102,192,244,0.2);
      padding: 6px 20px; border-radius: 20px;
    }

    .controls-row { display: flex; gap: 10px; align-items: center; }

    .btn {
      padding: 10px 24px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.3px;
    }
    .btn-start {
      background: linear-gradient(135deg, #4db34b, #3a9638);
      color: #fff;
      box-shadow: 0 4px 20px rgba(77,179,75,0.35);
    }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(77,179,75,0.5); filter: brightness(1.1); }
    .btn-start:active { transform: translateY(0); }

    .btn-pause {
      background: rgba(102,192,244,0.1);
      border: 1px solid rgba(102,192,244,0.2);
      color: #66c0f4;
    }
    .btn-pause:hover:not(:disabled) { background: rgba(102,192,244,0.2); }
    .btn-pause:disabled { opacity: 0.4; cursor: default; }

    .hints {
      display: flex; gap: 16px; font-size: 12px; color: #3a5566;
    }
    .hint { display: flex; align-items: center; gap: 5px; }
    .key {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px; padding: 2px 7px;
      font-size: 11px; color: #6a8a9a; font-family: monospace;
    }

    .dpad { display: none; flex-direction: column; align-items: center; gap: 4px; }
    .dpad-row { display: flex; gap: 4px; }
    .dpad-btn {
      width: 52px; height: 52px;
      background: rgba(102,192,244,0.08);
      border: 1px solid rgba(102,192,244,0.2);
      border-radius: 12px; color: #66c0f4; font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.1s; user-select: none; -webkit-user-select: none;
    }
    .dpad-btn:active { background: rgba(102,192,244,0.2); transform: scale(0.9); }

    @media (max-width: 560px) {
      canvas { width: 300px !important; height: 300px !important; }
      .dpad { display: flex; }
      .hints { display: none; }
      .score-item { padding: 10px 18px; }
      .score-value { font-size: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="history.back()">
    <div class="logo-icon">🎮</div>
    <div class="logo-text">Free<span>Play</span></div>
  </div>
  <a href="javascript:history.back()" class="back-btn">← Mağazaya Dön</a>
</header>

<div class="game-wrapper">
  <div class="game-title">🐍 Yılan <span>Oyunu</span></div>

  <div class="score-board">
    <div class="score-item">
      <div class="score-label">Skor</div>
      <div class="score-value accent" id="score">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Rekor</div>
      <div class="score-value green" id="best">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Seviye</div>
      <div class="score-value white" id="level">1</div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="480" height="480"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-icon" id="ov-icon">🐍</div>
      <div class="overlay-title" id="ov-title">Hazır mısın?</div>
      <div class="overlay-sub" id="ov-sub">BAŞLAT'a bas veya Boşluk tuşuna bas</div>
      <div class="overlay-score" id="ov-score" style="display:none"></div>
    </div>
  </div>

  <div class="controls-row">
    <button class="btn btn-start" id="btn-start" onclick="startGame()">▶ BAŞLAT</button>
    <button class="btn btn-pause" id="btn-pause" onclick="togglePause()" disabled>⏸ Duraklat</button>
  </div>

  <div class="hints">
    <div class="hint"><span class="key">↑↓←→</span> veya <span class="key">WASD</span> hareket</div>
    <div class="hint"><span class="key">Space</span> duraklat</div>
  </div>

  <div class="dpad">
    <div class="dpad-row"><div class="dpad-btn" ontouchstart="event.preventDefault();dpadPress('UP')" onclick="dpadPress('UP')">▲</div></div>
    <div class="dpad-row">
      <div class="dpad-btn" ontouchstart="event.preventDefault();dpadPress('LEFT')" onclick="dpadPress('LEFT')">◀</div>
      <div class="dpad-btn" ontouchstart="event.preventDefault();dpadPress('DOWN')" onclick="dpadPress('DOWN')">▼</div>
      <div class="dpad-btn" ontouchstart="event.preventDefault();dpadPress('RIGHT')" onclick="dpadPress('RIGHT')">▶</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const COLS = 20, ROWS = 20;
const CELL = W / COLS;
const R = CELL / 2;

let snake, dir, nextDir, food, bonuses, score, bestScore, level, speed;
let gameLoop = null, state = 'idle';
let tick_t = 0, foodPulse = 0, bgOffset = 0;
let particles = [], floatTexts = [];

/* ── helpers ── */
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpHex(a, b, t) {
  const p = n => [parseInt(n.slice(1,3),16), parseInt(n.slice(3,5),16), parseInt(n.slice(5,7),16)];
  const [ar,ag,ab] = p(a), [br,bg,bb] = p(b);
  const r = Math.round(lerp(ar,br,t)), g = Math.round(lerp(ag,bg,t)), bl = Math.round(lerp(ab,bb,t));
  return '#'+[r,g,bl].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function rand(a, b) { return Math.random()*(b-a)+a; }

/* ── init ── */
function initGame() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; level = 1; speed = 80;
  bonuses = []; particles = []; floatTexts = [];
  updateUI(); placeFood();
}

function placeFood() {
  const occupied = () => snake.map(s=>s.x+','+s.y).concat(bonuses.map(b=>b.x+','+b.y));
  let p;
  do { p = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (occupied().includes(p.x+','+p.y));
  food = {...p, pulse:0};

  if (score > 0 && score % 50 === 0) {
    let bp;
    do { bp = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
    while (occupied().concat([food.x+','+food.y]).includes(bp.x+','+bp.y));
    bonuses.push({...bp, life:100, maxLife:100, type: Math.random()<0.5?'star':'gem'});
  }
}

/* ── game flow ── */
function startGame() {
  initGame(); state = 'playing';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('btn-pause').disabled = false;
  document.getElementById('btn-pause').textContent = '⏸ Duraklat';
  document.getElementById('btn-start').textContent = '↺ Yeniden';
  canvas.focus(); clearInterval(gameLoop);
  gameLoop = setInterval(tick, speed);
  requestAnimationFrame(drawFrame);
}

function togglePause() {
  if (state === 'playing') {
    state = 'paused'; clearInterval(gameLoop);
    showOverlay('⏸','Duraklat','Devam etmek için tekrar bas','');
    document.getElementById('btn-pause').textContent = '▶ Devam';
  } else if (state === 'paused') {
    state = 'playing';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('btn-pause').textContent = '⏸ Duraklat';
    gameLoop = setInterval(tick, speed);
  }
}

function gameOver() {
  state = 'gameover'; clearInterval(gameLoop);
  document.getElementById('btn-pause').disabled = true;
  document.getElementById('btn-pause').textContent = '⏸ Duraklat';
  const isNew = score > (bestScore||0);
  if (isNew) { bestScore = score; localStorage.setItem('snake_best', bestScore); }
  updateUI();
  showOverlay(isNew?'🏆':'💀', isNew?'Yeni Rekor!':'Oyun Bitti',
    isNew ? 'Harika! Rekorunu kırdın.' : 'Tekrar denemek için BAŞLAT\'a bas',
    isNew ? `Skor: ${score} 🎉` : `Skor: ${score}`);
}

function showOverlay(icon, title, sub, scoreText) {
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  document.getElementById('ov-icon').textContent = icon;
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-sub').textContent = sub;
  const s = document.getElementById('ov-score');
  if (scoreText) { s.textContent = scoreText; s.style.display = 'block'; }
  else s.style.display = 'none';
}

/* ── logic tick ── */
function tick() {
  if (state !== 'playing') return;
  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  if (snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();

  snake.unshift(head);
  let grew = false;

  if (head.x === food.x && head.y === food.y) {
    const pts = 10 * level;
    score += pts; grew = true;
    burst(food.x, food.y, '#e74c3c', '#ff8a80', 14);
    addFloat(food.x, food.y, `+${pts}`, '#ff6b6b');
    placeFood();
    if (score % 100 === 0) {
      level++; speed = Math.max(40, speed-8);
      clearInterval(gameLoop); gameLoop = setInterval(tick, speed);
      addFloat(Math.floor(COLS/2), Math.floor(ROWS/2), `LVL ${level}!`, '#66c0f4');
    }
    updateUI();
  }

  bonuses = bonuses.filter(b => {
    if (head.x===b.x && head.y===b.y) {
      const pts = b.type==='star' ? 30*level : 50*level;
      score += pts; grew = true;
      burst(b.x, b.y, b.type==='star'?'#f39c12':'#9b59b6', '#fff', 18);
      addFloat(b.x, b.y, `+${pts}`, b.type==='star'?'#f39c12':'#c77dff');
      updateUI(); return false;
    }
    b.life--;
    return b.life > 0;
  });

  if (!grew) snake.pop();
  tick_t++;
}

/* ── particles ── */
function burst(gx, gy, col1, col2, count) {
  const cx = gx*CELL+R, cy = gy*CELL+R;
  for (let i=0; i<count; i++) {
    const a = (Math.PI*2*i)/count + rand(-0.3,0.3);
    const spd = rand(1.5,5);
    particles.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-rand(0,2),
      size:rand(3,7), color:Math.random()<0.5?col1:col2, life:1, decay:rand(0.02,0.04)});
  }
}

function addFloat(gx, gy, text, color) {
  floatTexts.push({x:gx*CELL+R, y:gy*CELL+R, text, color, life:1, vy:-1.2});
}

function updateFX() {
  particles = particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.vx*=0.96;
    p.life-=p.decay; p.size*=0.97;
    return p.life>0;
  });
  floatTexts = floatTexts.filter(f=>{
    f.y+=f.vy; f.life-=0.025;
    return f.life>0;
  });
  food.pulse = (food.pulse||0)+0.08;
  bgOffset += 0.3;
  bonuses.forEach(b=>{ b.pulse=(b.pulse||0)+0.1; });
}

/* ── drawing ── */
function drawFrame() {
  if (state!=='idle') updateFX();
  draw();
  requestAnimationFrame(drawFrame);
}

function draw() {
  /* background */
  ctx.fillStyle = '#07090d';
  ctx.fillRect(0,0,W,H);

  /* subtle grid */
  ctx.strokeStyle = 'rgba(42,71,94,0.18)';
  ctx.lineWidth = 0.5;
  for (let i=0;i<=COLS;i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,H); ctx.stroke();
  }
  for (let j=0;j<=ROWS;j++) {
    ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(W,j*CELL); ctx.stroke();
  }

  if (state==='idle') return;

  /* glow under snake head */
  if (snake && snake.length) {
    const h = snake[0];
    const grd = ctx.createRadialGradient(h.x*CELL+R,h.y*CELL+R,0, h.x*CELL+R,h.y*CELL+R, CELL*2.5);
    grd.addColorStop(0,'rgba(102,192,244,0.12)');
    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
  }

  /* particles */
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur=0; ctx.globalAlpha=1;

  /* float texts */
  floatTexts.forEach(f=>{
    ctx.globalAlpha = f.life;
    ctx.font = 'bold 16px Inter, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=f.color;
    ctx.shadowColor=f.color; ctx.shadowBlur=12;
    ctx.fillText(f.text, f.x, f.y);
  });
  ctx.shadowBlur=0; ctx.globalAlpha=1;

  /* bonuses */
  bonuses.forEach(b=>{
    const bx=b.x*CELL+R, by=b.y*CELL+R;
    const alpha = Math.min(1, b.life/30);
    const pulse = Math.sin(b.pulse)*2;
    ctx.globalAlpha = alpha;

    if (b.type==='star') {
      // outer glow ring
      const rng = ctx.createRadialGradient(bx,by,0,bx,by,CELL);
      rng.addColorStop(0,'rgba(243,156,18,0.25)'); rng.addColorStop(1,'transparent');
      ctx.fillStyle=rng; ctx.beginPath(); ctx.arc(bx,by,CELL,0,Math.PI*2); ctx.fill();
      // circle
      ctx.shadowColor='#f39c12'; ctx.shadowBlur=20;
      ctx.fillStyle='#f39c12';
      ctx.beginPath(); ctx.arc(bx,by,R-3+pulse,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.font=`bold ${Math.floor(CELL*0.55)}px sans-serif`;
      ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('⭐',bx,by);
    } else {
      const rng = ctx.createRadialGradient(bx,by,0,bx,by,CELL);
      rng.addColorStop(0,'rgba(155,89,182,0.25)'); rng.addColorStop(1,'transparent');
      ctx.fillStyle=rng; ctx.beginPath(); ctx.arc(bx,by,CELL,0,Math.PI*2); ctx.fill();
      ctx.shadowColor='#9b59b6'; ctx.shadowBlur=20;
      ctx.fillStyle='#9b59b6';
      ctx.beginPath(); ctx.arc(bx,by,R-3+pulse,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.font=`bold ${Math.floor(CELL*0.55)}px sans-serif`;
      ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('💎',bx,by);
    }
    ctx.globalAlpha=1;
  });

  /* food */
  const fp = food.pulse, fw = R-3+Math.sin(fp)*2;
  const fx=food.x*CELL+R, fy=food.y*CELL+R;
  // outer glow
  const frng = ctx.createRadialGradient(fx,fy,0,fx,fy,CELL);
  frng.addColorStop(0,'rgba(231,76,60,0.22)'); frng.addColorStop(1,'transparent');
  ctx.fillStyle=frng; ctx.beginPath(); ctx.arc(fx,fy,CELL,0,Math.PI*2); ctx.fill();
  // body
  ctx.shadowColor='#e74c3c'; ctx.shadowBlur=18;
  const foodGrd = ctx.createRadialGradient(fx-fw*0.3,fy-fw*0.3,0,fx,fy,fw);
  foodGrd.addColorStop(0,'#ff8a80'); foodGrd.addColorStop(0.5,'#e74c3c'); foodGrd.addColorStop(1,'#c0392b');
  ctx.fillStyle=foodGrd;
  ctx.beginPath(); ctx.arc(fx,fy,fw,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // shine
  ctx.globalAlpha=0.55;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(fx-fw*0.3,fy-fw*0.3,fw*0.25,fw*0.15,-Math.PI/4,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // stem
  ctx.strokeStyle='#27ae60'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(fx,fy-fw); ctx.quadraticCurveTo(fx+6,fy-fw-8,fx+4,fy-fw-6); ctx.stroke();

  /* snake */
  snake.forEach((seg,i) => {
    const t = i/Math.max(snake.length-1,1);
    const sx=seg.x*CELL, sy=seg.y*CELL;
    const pad = 1.5;

    if (i===0) {
      // head glow
      ctx.shadowColor='rgba(102,192,244,0.7)'; ctx.shadowBlur=18;
      // head gradient
      const hg = ctx.createLinearGradient(sx,sy,sx+CELL,sy+CELL);
      hg.addColorStop(0,'#7dd3fc'); hg.addColorStop(1,'#3b82f6');
      ctx.fillStyle=hg;
    } else {
      ctx.shadowBlur=0;
      const col = lerpHex('#4a9fd4','#1e3a50',Math.min(t*1.2,1));
      ctx.fillStyle=col;
    }

    const radius = i===0 ? 7 : i===snake.length-1 ? 5 : 5;
    ctx.beginPath();
    ctx.roundRect(sx+pad, sy+pad, CELL-pad*2, CELL-pad*2, radius);
    ctx.fill();

    // inner highlight on body
    if (i===0) {
      ctx.shadowBlur=0;
      ctx.globalAlpha=0.25;
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.roundRect(sx+pad+1,sy+pad+1,CELL-pad*2-4,CELL/3,4);
      ctx.fill();
      ctx.globalAlpha=1;
    }
  });

  ctx.shadowBlur=0;

  /* snake eyes */
  if (snake.length) {
    const h=snake[0];
    const hcx=h.x*CELL+R, hcy=h.y*CELL+R;
    const ex1={x:hcx+dir.y*5-dir.x*4, y:hcy-dir.x*5-dir.y*4};
    const ex2={x:hcx-dir.y*5-dir.x*4, y:hcy+dir.x*5-dir.y*4};

    [ex1,ex2].forEach(e=>{
      ctx.fillStyle='#0a0f14';
      ctx.beginPath(); ctx.arc(e.x,e.y,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#7dd3fc';
      ctx.beginPath(); ctx.arc(e.x+0.7,e.y-0.7,1.2,0,Math.PI*2); ctx.fill();
    });
  }
}

/* ── ui ── */
function updateUI() {
  document.getElementById('score').textContent = score;
  bestScore = Math.max(score, bestScore||0);
  document.getElementById('best').textContent = bestScore;
  document.getElementById('level').textContent = level;
}

/* ── input ── */
function setDir(nx,ny) {
  if (nx===-dir.x && ny===-dir.y) return;
  nextDir={x:nx,y:ny};
}
function dpadPress(d) {
  const m={UP:[0,-1],DOWN:[0,1],LEFT:[-1,0],RIGHT:[1,0]};
  const [nx,ny]=m[d];
  if (state==='idle'||state==='gameover') { startGame(); return; }
  setDir(nx,ny);
}

document.addEventListener('keydown',e=>{
  const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
    w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};
  if (m[e.key]) {
    e.preventDefault();
    if (state==='idle'||state==='gameover') { startGame(); return; }
    const [nx,ny]=m[e.key]; setDir(nx,ny);
  }
  if (e.key===' ') {
    e.preventDefault();
    if (state==='idle'||state==='gameover') startGame();
    else togglePause();
  }
});

/* ── boot ── */
bestScore = parseInt(localStorage.getItem('snake_best')||'0');
document.getElementById('best').textContent = bestScore;
canvas.focus();
requestAnimationFrame(drawFrame);
</script>
</body>
